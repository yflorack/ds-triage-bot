name: "DS Triage Bot"
description: "AI-powered design system triage for issues and PRs using Anthropic Claude"
author: "Design Systems Team"

inputs:
  anthropic_model:
    description: "Anthropic model to use for triage"
    required: false
    default: "claude-sonnet-4-20250514"
  max_tokens:
    description: "Maximum tokens for the model response"
    required: false
    default: "1024"
  dry_run:
    description: "If true, log actions but do not apply labels or post comments"
    required: false
    default: "false"

outputs:
  # ── Core triage fields ──────────────────────────────────────────
  category:
    description: "Triage category (bug, enhancement, docs, token-change, component-change, migration, question)"
  product_area:
    description: "Product area (Admin, Integrations, Reporting, Design System, Unknown)"
  risk:
    description: "Risk level (low, medium, high)"
  owner:
    description: "Suggested owner team (design, engineering, both, analytics, unknown)"
  confidence:
    description: "Confidence score 0.0-1.0"
  summary:
    description: "1-3 sentence triage summary"

  # ── Enhanced fields ─────────────────────────────────────────────
  estimated_effort:
    description: "T-shirt size effort estimate (xs, s, m, l, xl)"
  breaking_change:
    description: "Whether this is a breaking change (true/false)"
  related_components:
    description: "JSON array of affected component names"
  suggested_assignee_role:
    description: "Suggested reviewer/assignee role description"
  migration_notes:
    description: "Migration guidance (if applicable)"

  # ── Structured arrays (JSON) ────────────────────────────────────
  next_steps:
    description: "JSON array of recommended next steps"
  questions:
    description: "JSON array of clarifying questions"
  labels:
    description: "JSON array of all applied labels"
  success_metrics:
    description: "JSON array of success metrics"
  success_events:
    description: "JSON array of success events"

  # ── Full payloads (JSON) ────────────────────────────────────────
  ticket_json:
    description: "Full ticket template as JSON (type, title, priority, team, effort, acceptance_criteria, etc.)"
  triage_json:
    description: "Complete triage payload as JSON for custom integrations"

runs:
  using: "node20"
  main: "dist/index.js"

branding:
  icon: "tag"
  color: "purple"
