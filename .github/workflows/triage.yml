# This workflow is for the ds-triage-bot repo itself (self-testing).
# For OTHER repos, use: yflorack/ds-triage-bot@v1 (see README.md)

name: DS Triage Bot

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    outputs:
      category: ${{ steps.triage.outputs.category }}
      risk: ${{ steps.triage.outputs.risk }}
      owner: ${{ steps.triage.outputs.owner }}
      confidence: ${{ steps.triage.outputs.confidence }}
      estimated_effort: ${{ steps.triage.outputs.estimated_effort }}
      breaking_change: ${{ steps.triage.outputs.breaking_change }}
      ticket_json: ${{ steps.triage.outputs.ticket_json }}
      triage_json: ${{ steps.triage.outputs.triage_json }}
      summary: ${{ steps.triage.outputs.summary }}
    steps:
      - name: Checkout action
        uses: actions/checkout@v4

      - name: Run DS Triage Bot
        id: triage
        uses: ./
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_model: "claude-sonnet-4-20250514"
          max_tokens: "1024"
          dry_run: "false"

      - name: Log triage outputs
        run: |
          echo "Category: ${{ steps.triage.outputs.category }}"
          echo "Risk: ${{ steps.triage.outputs.risk }}"
          echo "Effort: ${{ steps.triage.outputs.estimated_effort }}"
          echo "Breaking: ${{ steps.triage.outputs.breaking_change }}"
          echo "Components: ${{ steps.triage.outputs.related_components }}"
          echo "Assignee role: ${{ steps.triage.outputs.suggested_assignee_role }}"

